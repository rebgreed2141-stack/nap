<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>午睡チェック</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4CAF50" />
  <link rel="icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="title">午睡チェック（ネット不要）</div>
  <div class="sub">
    <span>記録・カレンダー・管理</span>
    <span>保存：自動（localStorage）</span>
    <span>年度のバックアップ／年度のデータ復元／年度のデータ削除</span>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <div class="topbar">
      <div class="tabs">
        <button class="tabBtn active" id="tabRecord">3月1日の記録</button>
        <button class="tabBtn" id="tabCalendar">カレンダー</button>
        <button class="tabBtn" id="tabManage">管理</button>
        <button class="tabBtn" id="tabVersion">バージョン</button>
      </div>
      <div class="rightArea">
        <div class="version" id="topVersion">Ver.確認中</div>
      </div>
    </div>

    <div class="pane active" id="paneRecord">
      <div class="stickyBars">
        <div class="classBar">
          <div class="classGroup" id="classRadios"></div>
        </div>
        <div class="rangeBar" id="rangeBar">
          <div class="rangeGroup" id="rangeRadios"></div>
        </div>
      </div>

      <div class="status" id="viewStatus"></div>
      <div class="viewWrap">
        <div id="viewBody"></div>
      </div>
      <div class="foot">
        ■クラス選択で対象園児を切り替えます。<br>
        ■両方にチェックが入った時刻は赤表示になり、その状態は保存しません。<br>
        ■「最初に寝た時間」＝その園児で、その日に最初に記録が入った時刻です。
      </div>
    </div>

    <div class="pane" id="paneCalendar">
      <div class="status" id="calendarStatus"></div>
      <div class="calendarWrap">
        <div class="calendarBar">
          <button class="btn secondary" id="btnPrevMonth">↑</button>
          <div class="calendarTitle" id="calendarTitle">2026年 4月</div>
          <button class="btn secondary" id="btnNextMonth">↓</button>
        </div>
        <div class="calendarGrid" id="calendarGrid"></div>
      </div>
    </div>



    <div class="pane" id="paneVersion">
      <div class="status" id="versionStatus">バージョン情報を確認しています。</div>
      <div class="versionWrap">
        <div class="versionCard">
          <div class="versionTitle">現在のバージョン</div>
          <div class="versionValue" id="currentVersionText">確認中</div>
        </div>

        <div class="versionCard">
          <div class="versionTitle">最新のバージョン</div>
          <div class="versionValue" id="latestVersionText">確認中</div>
        </div>

        <div class="versionCard">
          <div class="versionRow">
            <button class="btn" id="btnUpdate" disabled>更新する</button>
          </div>
          <div class="versionNote">
            新しいバージョンがある場合だけボタンが押せます。
          </div>
        </div>
      </div>
    </div>

    <div class="pane" id="paneManage">
      <div class="status" id="manageStatus"></div>
      <div class="manageWrap">
        <div class="manageCard">
          <div class="manageTitle">年度</div>
          <div class="manageRow">
            <select id="yearSelect"></select>
          </div>
        </div>

        <div class="manageCard">
          <div class="manageTitle">年度のバックアップ</div>
          <div class="manageRow">
            <button class="btn secondary" id="btnBackup">年度のバックアップ</button>
          </div>
        </div>

        <div class="manageCard">
          <div class="manageTitle">年度のデータ復元</div>
          <div class="manageRow">
            <button class="btn secondary" id="btnRestore">年度のデータ復元</button>
            <input type="file" id="restoreZipInput" accept=".zip" style="display:none" />
          </div>
        </div>

        <div class="manageCard">
          <div class="manageTitle">年度のデータ削除</div>
          <div class="manageRow">
            <button class="btn danger" id="btnDeleteYear">年度のデータ削除</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="./jszip.min.js"></script>
<script src="app.js" defer></script>


</body>
</html>
